# TODO: Claude-generated mess with SSH keys. Refactor this file to be more concise and less hacky.

# The packer cleanup provisioner deletes SSH host keys (rm /etc/ssh/ssh_host_*)
# so every deployed instance boots with no keys and sshd refuses to start.
#
# bootcmd runs in cloud-init-local.service — before the network is up and
# before sshd starts — making it the earliest safe point to regenerate keys.
# ssh-keygen -A is idempotent: it only creates files that do not yet exist.
bootcmd:
  - [ sh, -c, "ssh-keygen -A" ]

# Prevent cc_ssh (modules:final, runs after sshd is already up) from
# overwriting the keys we just generated
ssh_deletekeys: false
ssh_genkeytypes: []
