- name: "create and run docker container"
  community.docker.docker_container:
    recreate: yes
    name: otel-collector
    user: 0
    privileged: yes
    network_mode: host
    ipc_mode: host
    pid_mode: host
    image: otel/opentelemetry-collector-contrib:0.93.0
    state: "{{ 'present' if jukebox_cluster_stage | default('all') == 'bake' else 'started' }}"
    stop_timeout: 10
    etc_hosts: >
      {
        "{{ otelcol_gw_host }}": "{{ otelcol_gw_ip }}"
      }
    volumes:
      - "{{ app_path }}/otel-config.yml:/otel-config.yml:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/etc/passwd:/etc/passwd:ro"
      - "/proc:/hostfs/proc:ro"
    command: '--config otel-config.yml'
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "10"
    restart_policy: always
    hostname: "{{ app_hostname }}"
  notify:
    - "prune docker"
  register: output
